<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$if(title-prefix)$$title-prefix$ - $endif$$if(pagetitle)$$pagetitle$$else$$if(title)$$title$$else$Fidra Docs$endif$$endif$</title>
  <meta name="theme-color" content="#f5f5f7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="$docsroot$styles.css">
  $for(css)$
  <link rel="stylesheet" href="$css$">
  $endfor$
</head>
<body class="docs-page" data-docs-root="$docsroot$" data-site-root="$siteroot$" data-doc-path="$docpath$">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="$docsroot$index.html">
        <img src="$siteroot$logo-header.svg" alt="Fidra">
        <span>$brandname$</span>
      </a>
      <div class="topbar-actions">
        <nav class="toplinks" aria-label="Secondary">
          <a href="$siteroot$index.html">Website</a>
          <a href="$siteroot$local-sync.html">Local Sync Guide</a>
          <a href="$siteroot$cloud-connect.html">Cloud Connect Guide</a>
        </nav>
        <button class="mobile-nav-trigger topbar-trigger" type="button" data-sidebar-open aria-controls="docs-sidebar" aria-expanded="false">
          Browse Docs
        </button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <aside class="docs-sidebar" id="docs-sidebar" data-sidebar>
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <div>
            <p class="sidebar-eyebrow">Documentation</p>
            <h2 class="sidebar-title">Fidra Docs</h2>
          </div>
          <button class="sidebar-expand" type="button" data-expand-all>Expand all</button>
        </div>

        <label class="sidebar-filter" for="docs-filter">
          <span class="sidebar-filter-label">Filter</span>
          <span class="sidebar-filter-field">
            <span class="sidebar-filter-icon" aria-hidden="true"></span>
            <input id="docs-filter" type="search" placeholder="Filter docs" autocomplete="off" spellcheck="false" data-doc-filter>
          </span>
        </label>

        <nav class="sidebar-nav" aria-label="Documentation" data-doc-nav></nav>
        <p class="sidebar-empty" hidden data-doc-empty>No matching docs.</p>
      </div>
    </aside>

    <button class="sidebar-backdrop" type="button" data-sidebar-close aria-hidden="true" tabindex="-1"></button>

    <section class="docs-main">
      <div class="docs-main-toolbar">
        <button class="mobile-nav-trigger" type="button" data-sidebar-open aria-controls="docs-sidebar" aria-expanded="false">
          Browse Docs
        </button>
      </div>

      <article class="doc-content">
        $body$
      </article>

      <nav class="doc-pagination" aria-label="Page navigation" data-doc-pagination></nav>
    </section>
  </main>

  <script src="$docsroot$shell.js" defer></script>
</body>
</html>
